name: SonarCloud Analysis

on:
  push:
    branches: [ "main", "develop" ] # 메인 브랜치에 코드가 push되면 자동으로 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 자코코 테스트 및 소나클라우드 분석 실행
        env:
          # 🟢 깃허브 세팅에 등록한 비밀 토큰을 환경 변수로 안전하게 주입!
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          chmod +x ./gradlew
          ./gradlew clean test jacocoTestReport sonar \
            -Dsonar.projectKey=hyomin-organization_sonar-test \
            -Dsonar.organization=hyomin-organization \
            -Dsonar.token=$SONAR_TOKEN