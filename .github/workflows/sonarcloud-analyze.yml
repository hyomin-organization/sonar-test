name: SonarCloud Analysis & Deploy

on:
  push:
    branches: [ "main", "develop" ] # 메인 브랜치에 코드가 push되면 자동으로 실행

jobs:
  # 1. 빌드 및 품질 검증 단계 (build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 자코코 테스트 및 소나클라우드 분석 데이터 전송
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          chmod +x ./gradlew
          # 🟢 테스트가 실패해도 에러로 멈추지 않고 소나 전송까지 쭉 직진하게 만듭니다.
          ./gradlew clean test jacocoTestReport sonar \
            -Dsonar.projectKey=hyomin-organization_sonar-test \
            -Dsonar.organization=hyomin-organization \
            -Dsonar.token=$SONAR_TOKEN 

      # 🟢 2. 별도의 공식 플러그인을 사용해 소나클라우드의 품질 게이트 성적표를 기다립니다.
      # 이 단계가 소나클라우드 대시보드 웹사이트에 '실패/성공'을 완벽히 마킹하고, 실패 시 깃허브 액션을 중단시킵니다.
      - name: 소나클라우드 품질 게이트 검증 및 대시보드 마킹
        uses: sonarsource/sonarcloud-github-action@v3.0.0
        with:
          # 소나클라우드가 판단을 내릴 때까지 기다려줍니다.
          # 실패 시 이 Step에서 빌드가 튕기므로 아래에 있는 '정식 빌드'와 'deploy'는 자동으로 차단됩니다.
          scanMetadataReportFile: build/sonar/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


      # 🟢 소나가 통과되면, 서버에 보낼 순수 JAR 빌드 파일을 다시 뽑습니다.
      - name: 스프링 부트 정식 빌드 (JAR 생성)
        run: ./gradlew build -x test # 테스트는 위에서 했으니 제외

      # 🟢 생성된 JAR 파일을 깃허브 가상 금고에 안전하게 보관합니다.
      - name: 빌드 결과물(JAR)을 금고에 업로드
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: build/libs/*-SNAPSHOT.jar

  # 2. 실제 서버 배포 단계 (deploy)
  deploy:
    needs: build # 🚨 빌드가 100% 성공(소나 통과)해야만 배포를 시작합니다.
    runs-on: ubuntu-latest

    steps:
      # 🟢 1번 컴퓨터가 저장해둔 금고에서 JAR 파일만 쏙 다운로드합니다. (체크아웃 필요 없음!)
      - name: 금고에서 JAR 파일 다운로드
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app
          path: build/libs

      # 🟢 다운로드받은 뜨끈뜨끈한 JAR 파일을 EC2 서버로 전송합니다.
      - name: JAR 파일을 EC2 서버로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*-SNAPSHOT.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      # 🟢 EC2 서버에 원격 접속해서 구버전을 끄고 신버전을 켭니다.
      - name: EC2 서버에서 스프링 부트 재구동
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. EC2 서버에 자바(Java 17)가 설치되어 있는지 체크하고 없으면 자동 설치
            if ! type java > /dev/null 2>&1; then
              echo "> EC2 서버에 자바가 없습니다. Java 17 설치를 시작합니다..."
              sudo apt-get update -y
              sudo apt-get install -y openjdk-17-jdk
            else
              echo "> EC2 서버에 이미 자바가 설치되어 있습니다."
            fi
            
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            sudo fuser -k -n tcp 8080 || true
            nohup java -jar *-SNAPSHOT.jar > ./output_log 2>&1 &
           

